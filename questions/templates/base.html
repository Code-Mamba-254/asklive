<!DOCTYPE html>
<html>
<head>
  <title>AskLive</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background: #f5f7fa; }
    .card { border-radius: 12px; }
    .brand { font-weight: bold; letter-spacing: 1px; }
    .big-text { font-size: 1.6rem; }
    .display-question { font-size: 2.2rem; }
  </style>
</head>
<body>
    <nav class="navbar mb-4">
  <div class="container d-flex align-items-center gap-3">
    {% if event and event.logo %}
      <img src="{{ event.logo.url }}" height="40">
    {% endif %}
    <span class="navbar-brand brand text-white">AskLive</span>
  </div>
</nav>

  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
